<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Memory Book – Raj ♥ Jharna</title>
  <meta name="description" content="A private digital memory book for Raj and Jharna." />
  <link rel="stylesheet" href="css/password.css" />
</head>
<body>
  <!-- Floating hearts background -->
  <div class="hearts-bg" id="hearts-bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="password-card">
    <!-- Corner sparkles -->
    <span class="sparkle">✨</span>
    <span class="sparkle">💫</span>
    <span class="sparkle">⭐</span>
    <span class="sparkle">✨</span>

    <div class="pw-logo"><img src="assets/images/rj-logo.png" alt="RJ Logo" /></div>
    <span class="pw-heart">💕</span>
    <h1 class="pw-title">Our Memory Book</h1>
    <p class="pw-subtitle">Raj ❤️ Jharna</p>
    <p class="pw-desc">This little place on the internet keeps our memories — our laughs, our moments, our beautiful story.</p>

    <div class="pw-input-wrap">
      <span class="pw-input-icon">🔒</span>
      <input type="password" id="pw-input" placeholder="Enter the secret password" autocomplete="off" />
      <button class="pw-toggle" id="pw-toggle" type="button" title="Show/Hide">👁</button>
    </div>

    <button class="pw-btn" id="pw-btn">Unlock Memories 💝</button>

    <div class="pw-error" id="pw-error">
      Oops, that password doesn't seem right. Try again 💫
    </div>
    <p class="pw-hint">Hint: it's a name very close to the heart 🌸</p>
  </div>

  <script>
    // Floating hearts
    const hb = document.getElementById('hearts-bg');
    const syms = ['💗','💕','♥','💖','❤','💝','✨'];
    for (let i = 0; i < 20; i++) {
      const s = document.createElement('span');
      s.textContent = syms[Math.floor(Math.random() * syms.length)];
      s.style.left = Math.random() * 100 + '%';
      s.style.fontSize = (0.9 + Math.random() * 1.6) + 'rem';
      s.style.animationDuration = (8 + Math.random() * 14) + 's';
      s.style.animationDelay = (Math.random() * 10) + 's';
      hb.appendChild(s);
    }

    // Password logic
    const PW = 'jharna';
    const input = document.getElementById('pw-input');
    const btn = document.getElementById('pw-btn');
    const err = document.getElementById('pw-error');
    const toggle = document.getElementById('pw-toggle');

    toggle.addEventListener('click', () => {
      input.type = input.type === 'password' ? 'text' : 'password';
      toggle.textContent = input.type === 'password' ? '👁' : '🙈';
    });

    btn.addEventListener('click', unlock);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') unlock(); });

    function unlock() {
      if (input.value.trim().toLowerCase() === PW) {
        sessionStorage.setItem('rj_unlocked', '1');
        document.body.classList.add('page-fade-out');
        setTimeout(() => { window.location.href = 'index.html'; }, 650);
      } else {
        err.classList.add('show');
        input.value = '';
        input.focus();
        setTimeout(() => err.classList.remove('show'), 3500);
      }
    }
  </script>
</body>
</html>
